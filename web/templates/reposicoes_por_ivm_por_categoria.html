<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Aplicação</title>
</head>
<body style="padding:20px">
    <h1>Reposições por Categoria</h1>
    <a href="../reposicoes?num_serie={{ num_serie }}&fabricante={{ fabricante }}">Voltar</a>
{% if cursor %}
    <table border="2px">
        <thead>
            <tr>
                <th>Categoria</th>
                <th>Unidades Repostas</th>
            </tr>
        </thead>
        <tbody>
            {% for record in cursor %}
            <tr>
                <td>{{ record[0] }}</td>
                <td>{{ record[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p> Erro ao obter dados da base de dados!</p>
{% endif %}
</body>
</html>
