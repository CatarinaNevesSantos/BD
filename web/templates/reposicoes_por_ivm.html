<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Aplicação</title>
</head>
<body style="padding:20px">
    <h1>Reposições</h1>
    <a href="./reposicoes/categoria?num_serie={{ num_serie }}&fabricante={{ fabricante }}">Unidades por categoria</a>
    <a href="./ivms">Voltar</a>
{% if cursor %}
    <table border="2px">
        <thead>
            <tr>
                <th>EAN</th>
                <th>Numero Prateleira</th>
                <th>Instante</th>
                <th>Unidades</th>
                <th>TIN</th>
            </tr>
        </thead>
        <tbody>
            {% for record in cursor %}
            <tr>
                <td>{{ record[0] }}</td>
                <td>{{ record[1] }}</td>
                <td>{{ record[2] }}</td>
                <td>{{ record[3] }}</td>
                <td>{{ record[4] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p> Erro ao obter dados da base de dados!</p>
{% endif %}
</body>
</html>
