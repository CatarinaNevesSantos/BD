<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Aplicação</title>
</head>

<body style="padding:20px">
    <h1>Retalhistas</h1>
    <a href="./">Voltar</a>

    {% if cursor %}

    <h3>Inserir Retalhista</h3>

    <form action="./retalhistas/adicionar" method="post">
        <p>
            TIN: <input type="text" name="tin" />
            Nome: <input type="text" name="nome" />
        </p>
        <p>
            <input type="submit" value="Adicionar" />
        </p>
    </form>

    <table border="2px">
        <thead>
            <tr></tr>
            <th>TIN</th>
            <th>Nome</th>
            <th>Remover</th>
            </tr>
        </thead>
        <tbody>
            {% for record in cursor %}
            <tr>
                <td>{{ record[0] }}</td>
                <td>{{ record[1] }}</td>
                <td>
                    <form action="./retalhistas/remover" method="post">
                        <input type="hidden" name="tin" value="{{ record[0] }}" />
                        <input type="submit" value="Remover" />
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p> Erro ao obter dados da base de dados!</p>
    {% endif %}
</body>

</html>
