<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Aplicação</title>
</head>
<body style="padding:20px">
    <h1>IVMs</h1>
    <a href="./">Voltar</a>

{% if cursor %}
    <table border="2px">
        <thead>
            <tr>
                <th>Número de Série</th>
                <th>Fabricante</th>
                <th>Eventos de Reposição</th>
            </tr>
        </thead>
        <tbody>
            {% for record in cursor %}
            <tr>
                <td>{{ record[0] }}</td>
                <td>{{ record[1] }}</td>
                <td><a href="./reposicoes?num_serie={{ record[0] }}&fabricante={{ record[1] }}">Consultar</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p> Erro ao obter dados da base de dados!</p>
{% endif %}

   
</body>
</html>
